name: Loan MLOps CI/CD

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      # Checkout your repo
      - uses: actions/checkout@v3

      # Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies
      - run: pip install -r requirements.txt

      # Pull data from DVC
      - run: dvc pull

      # Run training script
      - run: python src/train.py

      # Upload trained artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: mlruns/**

  docker:
    runs-on: ubuntu-latest
    needs: train
    steps:
      # Checkout repo again for Docker context
      - uses: actions/checkout@v3

      # Setup Docker Buildx
      - uses: docker/setup-buildx-action@v2

      # Login to Docker Hub
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - run: |
          docker build -t loan-mlops:latest .
          docker tag loan-mlops:latest yourusername/loan-mlops:latest
          docker push yourusername/loan-mlops:latest