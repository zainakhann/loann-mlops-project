name: Loan MLOps CI/CD

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated versions
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Install everything properly
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      # ✅ Debug (CRITICAL)
      - name: Debug file structure
        run: |
          echo "Current directory:"
          pwd
          echo "Listing files:"
          ls -R

      # ✅ DVC Pull (SAFE VERSION)
      - name: Pull data from DVC
        run: dvc pull || echo "DVC pull failed, continuing..."

      # ✅ Run training
      - name: Run training
        run: python src/train.py

      # ✅ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/
            mlruns/

  docker:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          docker build -t loan-mlops:latest .
          docker tag loan-mlops:latest yourusername/loan-mlops:latest
          docker push yourusername/loan-mlops:latest